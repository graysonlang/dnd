<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8">
    <title>Test Drag and Drop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <script type="module">
      function onLoad() {
        const dropzone = document.querySelector('.dropzone');

        const imagePreviewRegion = document.getElementById("image-preview");

        if (window.FileList && window.File) {
          ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(type => {
            window.addEventListener(type, event => {
              event.preventDefault();
              event.stopPropagation();
            });
          });

          ['dragenter'].forEach(type => {
            window.addEventListener(type, () => { dropzone.classList.add("active"); });
          });

          ['dragleave', 'drop'].forEach(type => {
            window.addEventListener(type, () => { dropzone.classList.remove("active"); });
          });

          window.addEventListener('dragover', event => {
            event.dataTransfer.dropEffect = 'copy';
          });

          window.addEventListener('drop', event => {
            let images = [];
            var items = event.dataTransfer.items;
            for (var i = 0; i < items.length; ++i) {
              var item = items[i].webkitGetAsEntry();
              if (item) {
                traverse(item, '', images);
              }
            }
            // console.log(imageFiles)

            // var files = event.dataTransfer.files;
            // for (var i = 0, len = files.length; i < len; i++) {
            //   let file = files[i];
            //   if (validateImage(file)) {
            //     loadImage(file);
            //   }
            // }
          });
        }

        function readImage(file) {
          const reader = new FileReader();
          reader.addEventListener('load', (event) => {
            // uploaded_image = event.target.result;
            // document.querySelector("#image_drop_area").style.backgroundImage = `url(${uploaded_image})`;
            document.getElementById('body').appendChild(img);

          });
          reader.readAsDataURL(file);
        }

        function traverse(item, path, images) {
          path = path || "";
          if (item.isFile) {
            item.file(file => {
              console.log(`${path}${file.name} (type: ${file.type}, size: ${file.size})`);
              switch(file.type) {
                case 'image/jpeg':
                case 'image/png':
                case 'image/gif':
                  imageFiles = imageFiles.concat(item);
                  console.log(imageFiles)
  //   fileList = event.dataTransfer.files;
  //   document.querySelector("#file_name").textContent = fileList[0].name;
  //   readImage(fileList[0]);
  // });
              }
            });
          } else if (item.isDirectory) {
            var reader = item.createReader();
            reader.readEntries(entries => {
              for (var i = 0; i < entries.length; ++i) {
                imageFiles = imageFiles.concat(traverse(entries[i], path + item.name + "/"));
                console.log(imageFiles)
              }
            });
          }
          return imageFiles;
        }

        function validateImage(image) {
          var validTypes = ['image/jpeg', 'image/png', 'image/gif'];
          if (validTypes.indexOf(image.type) === -1) {
            return false;
          }
          var maxSizeInBytes = 10e6; // 10MB
          if (image.size > maxSizeInBytes) {
            alert("File too large");
            return false;
          }
          return true;
        }

        function loadImage(image) {
          var imgView = document.createElement("div");
          imgView.className = "image-view";
          imagePreviewRegion.appendChild(imgView);
          var img = document.createElement("img");
          imgView.appendChild(img);
          var reader = new FileReader();
          reader.onload = function(event) {
            img.src = event.target.result;
          }
          reader.readAsDataURL(image);
        }
      }
      window.addEventListener('load', onLoad);
    </script>
  </head>
  <body>
    <div class="dropzone"></div>
    <div id="image-preview"></div>
</div>
  </body>
</html>
