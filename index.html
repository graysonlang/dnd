<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8">
    <title> </title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <script type="module">
      var filesAwaitingRead = 0;
      var cells = [];

      function attachThumbnails() {
        cells.sort((a, b) => {
          const nameA = a.name.toUpperCase();
          const nameB = b.name.toUpperCase();
          if (nameA > nameB) return 1;
          if (nameA < nameB) return -1;
          return 0;
        });
        const grid = document.querySelector('.grid');
        for (var item of cells) {
          grid.appendChild(item.cell);
        }
      }

      const sku_regex = /^([^ -]+-)(\w+)/ig
      function loadImage(file) {
        let cell = document.createElement("div");
        cell.className = "cell";
        var img = cell.appendChild(document.createElement("img"));
        var sku = cell.appendChild(document.createElement("div"));
        sku.className = "sku";
        let filename_chunks = file.name.split('.');
        filename_chunks.pop();
        let filename = filename_chunks.join('.');
        let chunks = filename.split('-');
        let found = filename.match(sku_regex);
        if (found) {
          let sku_prefix = chunks.shift();
          let sku_suffix = chunks.shift();
          sku.innerHTML = sku_prefix + "<br>" + sku_suffix + "<br>&nbsp;<br>" + chunks.join("-");
        }
        const reader = new FileReader();
        reader.addEventListener('load', event => {
          img.src = event.target.result;
        });
        reader.readAsDataURL(file);
        return cell;
      }

      function handleFileRead(file, path) {
        filesAwaitingRead--;
        switch(file.type) {
          case 'image/jpeg':
          case 'image/png':
          case 'image/gif':
          // console.log(`${path} (type: ${file.type}, size: ${file.size})`);
          cells.push(
            {
              name: path + file.name,
              cell: loadImage(file)
            }
          );
        }
        if (filesAwaitingRead == 0) {
          attachThumbnails();
        }
      }

      function handleFileReadError(error) {
        filesAwaitingRead--;
      }

      window.addEventListener('load', () => {
        if (window.FileList && window.File) {
          const grid = document.body.appendChild(document.createElement("div"));
          grid.className = 'grid';
          const dropzone = document.body.appendChild(document.createElement("div"));
          dropzone.className = 'dropzone';
          ['dragenter'].forEach(
            type => window.addEventListener(type, () => dropzone.classList.add("active")));
          ['dragleave', 'drop'].forEach(
            type => window.addEventListener(type, () => dropzone.classList.remove("active")));
          ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(
            type => window.addEventListener(type, event => event.preventDefault(), event.stopPropagation()));
          window.addEventListener('dragover', event => event.dataTransfer.dropEffect = 'copy' );
          window.addEventListener('drop', event => scanItems(event.dataTransfer.items, resolve) );
        }
      });

      async function scanItems(items, callback) {
        var dirs_to_load = 0;
        let file_entries = [];
        function traverse(entry) {
          if (entry.isFile) {
            file_entries.push(entry);
          } else if (entry.isDirectory) {
            ++dirs_to_load;
            var reader = entry.createReader();
            reader.readEntries((entries) => {
              entries.forEach((entry) => {
                traverse(entry);
              });
              --dirs_to_load;
              if (!dirs_to_load) {
                setTimeout(callback(file_entries));
              }
            });
          }
        }
        for (let item of event.dataTransfer.items) {
          if (item.kind == 'file') {
            traverse(await item.webkitGetAsEntry());
          }
        }
        if (!dirs_to_load) {
          setTimeout(callback(file_entries));
        }
      }

      function resolve(file_entries) {
        file_entries.sort((a, b) => {
          const nameA = a.fullPath.toUpperCase();
          const nameB = b.fullPath.toUpperCase();
          if (nameA > nameB) return 1;
          if (nameA < nameB) return -1;
          return 0;
        });
        for (let entry of file_entries) {
          filesAwaitingRead++;
          if (entry) {
            entry.file(
              file => handleFileRead(file, entry.fullPath),
              file => handleFileReadError(exception)
            );
          }
        }
      }
    </script>
  </head>
  <body></body>
</html>
