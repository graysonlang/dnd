<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8">
    <style>

@page {
  size: letter landscape;
  margin: 20mm;
}

#drop-region {
  background-color: #fff;
  border-radius:20px;
  box-shadow:0 0 35px rgba(0,0,0,0.05);
  width:400px;
  padding:60px 40px;
  text-align: center;
  cursor:pointer;
  transition:.3s;
}

#image-preview {
  margin-top:20px;
}

#image-preview .image-view {
    display: inline-block;
  position:relative;
  margin-right: 13px;
  margin-bottom: 13px;
}

#image-preview .image-view img {
    max-width: 100px;
    max-height: 100px;
}

#image-preview .overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    right: 0;
    z-index: 2;
/*    background: rgba(255,255,255,0.5);*/
}

div.dropzone
{
    /* positions to point 0,0 - required for z-index */
    position: fixed; top: 0; left: 0;
    /* above all elements, even if z-index is used elsewhere
       it can be lowered as needed, but this value surpasses
       all elements when used on YouTube for example. */
    z-index: 9999999999;
    /* takes up 100% of page */
    width: 100%; height: 20%;
    /* dim the page with 50% black background when visible */
    background-color: rgba(1,0,0,0.5);
    /* a nice fade effect, visibility toggles after 175ms, opacity will animate for 175ms. note display:none cannot be animated.  */
/*    transition: visibility 175ms, opacity 175ms;*/
}

    </style>
    <script>
      function onLoad() {
      var // where files are dropped + file selector is opened
  dropRegion = document.getElementById("drop-region"),
  // where images are previewed
  imagePreviewRegion = document.getElementById("image-preview");


// open file selector when clicked on the drop region
var fakeInput = document.createElement("input");
fakeInput.type = "file";
// fakeInput.accept = "image/*";
fakeInput.webkitdirectory = true;
fakeInput.multiple = true;
  // let body = document.getElementById("body")
  document.body.style.minHeight = '100vh';
  document.body.style.cursor = 'pointer';
   document.body.addEventListener('click', function() {
  fakeInput.click();
});
  // dropRegion.addEventListener('click', function() {
  // fakeInput.click();
// });

fakeInput.addEventListener("change", function() {
  var files = fakeInput.files;
  handleFiles(files);
});


function preventDefault(e) {
  e.preventDefault();
    e.stopPropagation();
}

dropRegion.addEventListener('dragenter', preventDefault, false)
dropRegion.addEventListener('dragleave', preventDefault, false)
dropRegion.addEventListener('dragover', preventDefault, false)
dropRegion.addEventListener('drop', preventDefault, false)


function handleDrop(e) {
  var dt = e.dataTransfer,
    files = dt.files;

  if (files.length) {

    handleFiles(files);

  } else {

    // check for img
    var html = dt.getData('text/html'),
          match = html && /\bsrc="?([^"\s]+)"?\s*/.exec(html),
          url = match && match[1];



      if (url) {
          uploadImageFromURL(url);
          return;
      }

  }


  function uploadImageFromURL(url) {
    var img = new Image;
        var c = document.createElement("canvas");
        var ctx = c.getContext("2d");

        img.onload = function() {
            c.width = this.naturalWidth;     // update canvas size to match image
            c.height = this.naturalHeight;
            ctx.drawImage(this, 0, 0);       // draw in image
            c.toBlob(function(blob) {        // get content as PNG blob

              // call our main function
                handleFiles( [blob] );

            }, "image/png");
        };
        img.onerror = function() {
            alert("Error in uploading");
        }
        img.crossOrigin = "";              // if from different origin
        img.src = url;
  }

}

dropRegion.addEventListener('drop', handleDrop, false);



function handleFiles(files) {
  console.log(files)
  for (var i = 0, len = files.length; i < len; i++) {
    let file = files[i];
    console.log(file)
    if (validateImage(files[i]))
      previewAnduploadImage(files[i]);
  }
}

function validateImage(image) {
  // check the type
  var validTypes = ['image/jpeg', 'image/png', 'image/gif'];
  if (validTypes.indexOf( image.type ) === -1) {
    alert("Invalid File Type");
    return false;
  }

  // check the size
  var maxSizeInBytes = 10e6; // 10MB
  if (image.size > maxSizeInBytes) {
    alert("File too large");
    return false;
  }

  return true;

}

function previewAnduploadImage(image) {

  // container
  var imgView = document.createElement("div");
  imgView.className = "image-view";
  imagePreviewRegion.appendChild(imgView);

  // previewing image
  var img = document.createElement("img");
  imgView.appendChild(img);

  // progress overlay
  var overlay = document.createElement("div");
  overlay.className = "overlay";
  imgView.appendChild(overlay);


  // read the image...
  var reader = new FileReader();
  reader.onload = function(e) {
    img.src = e.target.result;
  }
  reader.readAsDataURL(image);

  // // create FormData
  // var formData = new FormData();
  // formData.append('image', image);

  // // upload the image
  // var uploadLocation = 'https://api.imgbb.com/1/upload';
  // formData.append('key', 'bb63bee9d9846c8d5b7947bcdb4b3573');

  // var ajax = new XMLHttpRequest();
  // ajax.open("POST", uploadLocation, true);

  // ajax.onreadystatechange = function(e) {
  //   if (ajax.readyState === 4) {
  //     if (ajax.status === 200) {
  //       // done!
  //     } else {
  //       // error!
  //     }
  //   }
  // }

  // ajax.upload.onprogress = function(e) {

  //   // change progress
  //   // (reduce the width of overlay)

  //   var perc = (e.loaded / e.total * 100) || 100,
  //     width = 100 - perc;

  //   overlay.style.width = width;
  // }

  // ajax.send(formData);

}
      }
      window.addEventListener('load', onLoad);
    </script>
  </head>
