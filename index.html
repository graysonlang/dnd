<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8">
    <title>Test Drag and Drop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <script type="module">
      var filesAwaitingRead = 0;
      var cells = [];

      function attachThumbnails() {
        cells.sort((a, b) => {
          const nameA = a.name.toUpperCase();
          const nameB = b.name.toUpperCase();
          if (nameA > nameB) return 1;
          if (nameA < nameB) return -1;
          return 0;
        });
        const grid = document.querySelector('.grid');
        for (var item of cells) {
          grid.appendChild(item.cell);
        }
      }

      const sku_regex = /^([^ -]+-)(\w+)/ig
      function loadImage(file) {
        let cell = document.createElement("div");
        cell.className = "cell";
        var img = cell.appendChild(document.createElement("img"));
        var sku = cell.appendChild(document.createElement("div"));
        sku.className = "sku";
        let filename_chunks = file.name.split('.');
        filename_chunks.pop();
        let filename = filename_chunks.join('.');
        let chunks = filename.split('-');
        let found = filename.match(sku_regex);
        if (found) {
          let sku_prefix = chunks.shift();
          let sku_suffix = chunks.shift();
          sku.innerHTML = sku_prefix + "<br>" + sku_suffix + "<br>&nbsp;<br>" + chunks.join("-");
        }
        const reader = new FileReader();
        reader.addEventListener('load', event => {
          img.src = event.target.result;
        });
        reader.readAsDataURL(file);
        return cell;
      }

      function handleFileRead(file, path) {
        filesAwaitingRead--;
        switch(file.type) {
          case 'image/jpeg':
          case 'image/png':
          case 'image/gif':
          // console.log(`${path}${file.name} (type: ${file.type}, size: ${file.size})`);
          cells.push(
            {
              name: path + file.name,
              cell: loadImage(file)
            }
          );
        }
        if (filesAwaitingRead == 0) {
          attachThumbnails();
        }
      }

      function handleFileReadError(error) {
        filesAwaitingRead--;
      }

      function onLoad() {
        if (window.FileList && window.File) {
          const dropzone = document.querySelector('.dropzone');

          ['dragenter'].forEach(type => {
            window.addEventListener(type, () => { dropzone.classList.add("active"); });
          });

          ['dragleave', 'drop'].forEach(type => {
            window.addEventListener(type, () => { dropzone.classList.remove("active"); });
          });

          ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(type => {
            window.addEventListener(type, event => {
              event.preventDefault();
              event.stopPropagation();
            });
          });

          window.addEventListener('dragover', event => {
            event.dataTransfer.dropEffect = 'copy';
          });

          window.addEventListener('drop', event => {
            var items = event.dataTransfer.items;
            for (var item of items) {
              traverse(item.webkitGetAsEntry());;
            }
          });
        }

        function traverse(entry, path) {
          if (entry) {
            path = path || "";
            if (entry.isFile) {
              filesAwaitingRead++;
              entry.file(
                file => handleFileRead(file, path),
                file => handleFileReadError(exception)
              );
            } else if (entry.isDirectory) {
              var reader = entry.createReader();
              reader.readEntries(entries => {
                for (var i = 0; i < entries.length; ++i) {
                  traverse(entries[i], path + entry.name + "/");
                }
              });
            }
          }
        }
      }
      window.addEventListener('load', onLoad);
    </script>
  </head>
  <body><div class="grid"></div><div class="dropzone"></div>
  </body>
</html>
